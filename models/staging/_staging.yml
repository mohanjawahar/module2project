version: 2

models:
  - name: stg_customers
    description: "Cleaned Olist customers"
    columns:
      - name: customer_id
        tests: [not_null, unique]

  - name: stg_orders
    description: "Cleaned orders"
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: stg_order_items
    description: "Cleaned order items"

  - name: stg_products
    description: "Cleaned products"

  - name: stg_sellers
    description: "Cleaned sellers"